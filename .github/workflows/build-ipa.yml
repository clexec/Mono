name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true
          xcodebuild -version
          xcode-select -p

      - name: Build Archive
        run: |
          mkdir -p build
          cd ios-there-music
          xcodebuild archive \
            -project Monk.xcodeproj \
            -scheme Monk \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ../build/Monk.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee ../build/xcodebuild-archive.log || true
          # Check if archive was created
          ls -la ../build/Monk.xcarchive/Products/Applications/ 2>/dev/null || { echo "ERROR: Archive not found"; exit 1; }

      - name: Create IPA from Archive
        run: |
          mkdir -p build/Payload
          cp -r build/Monk.xcarchive/Products/Applications/Monk.app build/Payload/Monk.app
          cd build
          zip -r ../Monk.ipa Payload/
          cd ..
          ls -la Monk.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Monk-IPA
          path: Monk.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/xcodebuild-archive.log
